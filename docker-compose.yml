version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: innov_pay_db
    restart: always
    environment:
      POSTGRES_USER: innov_user
      POSTGRES_PASSWORD: innov_password
      POSTGRES_DB: innov_pay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: innov_pay_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: innov_pay_backend
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://innov_user:innov_password@db:5432/innov_pay?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecretjwtkeyforinnovpay2026aggregator
      JWT_REFRESH_SECRET: supersecretjwtrefreshkeyforinnovpay2026aggregator
      ENCRYPTION_KEY: d7a5b3a3c27e85c13b28b7e415fb507a213e89a5940f8b1a4570220c5417ab90
      NODE_ENV: development
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: innov_pay_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next

  nginx:
    image: nginx:alpine
    container_name: innov_pay_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  redisdata:
